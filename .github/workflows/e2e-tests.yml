name: End-to-End Tests

on:
  pull_request:
    branches: [ master ]

jobs:
  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install
      
      - name: Install Playwright browsers and dependencies
        run: |
          cd frontend
          npx playwright install --with-deps chromium
      
      - name: Setup Rust toolchain (for Tauri driver)
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install Tauri driver
        run: cargo install tauri-driver --locked
      
      - name: Install system dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      
      - name: Setup Python backend
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FRANCE_TRAVAIL_API_KEY: ${{ secrets.FRANCE_TRAVAIL_API_KEY }}
      
      - name: Install backend dependencies
        run: |
          cd backend
          pip install .
      
      - name: Run Playwright tests
        timeout-minutes: 30
        run: |
          cd frontend
          # Start backend in background
          cd ../backend
          python -m src.api.rpc_server &
          BACKEND_PID=$!
          cd ../frontend
          # Start Tauri dev server in background (with test mode)
          npm run tauri dev -- --config src-tauri/tauri.conf.test.json &
          TAURI_PID=$!
          sleep 30 # Wait for services to start
          # Run Playwright tests
          npm run test:e2e -- --reporter=html --retries=2
          TEST_EXIT_CODE=$?
          # Cleanup
          kill $BACKEND_PID 2>/dev/null || true
          kill $TAURI_PID 2>/dev/null || true
          exit $TEST_EXIT_CODE
        env:
          CI: true
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FRANCE_TRAVAIL_API_KEY: ${{ secrets.FRANCE_TRAVAIL_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
      
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
      
      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: frontend/test-results/
          retention-days: 7